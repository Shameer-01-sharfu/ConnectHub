{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">
                        ✏️ Edit Post
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Caption
                            </label>

                            {{ form.caption }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Change Image
                            </label>

                            {{ form.image }}

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success">

                            💾 Update Post

                        </button>

                        <a href="{% url 'feed' %}"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
