{% for chat in conversation_list %}

<a href="{% url 'chat' chat.person.id %}"
class="text-decoration-none text-dark">

<div class="card mb-2">

<div class="card-body d-flex align-items-center">

<img
src="{{ chat.person.profile.profile_picture.url }}"
width="55"
height="55"
class="rounded-circle me-3"
style="object-fit:cover;">

<div class="flex-grow-1">

<h6 class="mb-1">

{{ chat.person.first_name }}
{{ chat.person.last_name }}

</h6>

<small class="text-muted">

{{ chat.last_message }}

</small>

</div>

<div class="text-end">

<small class="text-muted">

{{ chat.time|date:"h:i A" }}

</small>

{% if chat.unread %}

<div
class="badge bg-primary rounded-pill mt-1">

{{ chat.unread }}

</div>

{% endif %}

</div>

</div>

</div>

</a>

{% endfor %}
