        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Share Reel

                </h5>

                <button
                    class="btn-close"

            </div>

            <div class="modal-body">

                <input

                    id="user-search"
                    class="form-control"

                </div>

            </div>

        </div>

    </div>

</div>
