{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>🔔 Notifications</h2>

<hr>

{% for n in notifications %}

<div class="card p-3 mb-3">

<b>{{ n.sender.first_name }} {{ n.sender.last_name }}</b>

<br>

{{ n.message }}

<br>

<small class="text-muted">

{{ n.created_at }}

</small>

</div>

{% empty %}

<div class="alert alert-info">

No notifications yet.

</div>

{% endfor %}

</div>

{% endblock %}
